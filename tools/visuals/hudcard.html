<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
:root{--bg:#08030a;--panel:#0a0407;--line:#3a0d1a;--ink:#F5E8EA;--dim:#c89aa3;--faint:#7a4a52;
  --accent:#FF1744;--ok:#00E676;--warn:#FF9100;--run:#2196F3}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;
  font-family:"Cascadia Mono",Consolas,monospace;color:var(--ink)}
#stage{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
  align-items:center;padding:6vw;text-align:center}
#sig{position:absolute;top:4vh;left:0;right:0;text-align:center;color:var(--faint);
  font-size:1.4vw;letter-spacing:.5em}
#kicker{color:var(--accent);font-size:1.6vw;letter-spacing:.3em;margin-bottom:2.5vh;
  text-transform:uppercase;text-shadow:0 0 20px rgba(255,23,68,.6)}
#title{font-size:4.2vw;font-weight:700;line-height:1.25;max-width:80vw;white-space:pre-wrap}
#title .hl{color:var(--accent);text-shadow:0 0 24px rgba(255,23,68,.55)}
#counter{font-size:9vw;font-weight:700;font-variant-numeric:tabular-nums;
  text-shadow:0 0 40px rgba(255,23,68,.4)}
#counterlbl{color:var(--faint);font-size:1.6vw;letter-spacing:.4em;margin-top:1vh;text-transform:uppercase}
#lines{margin-top:4vh;display:flex;flex-direction:column;gap:1.4vh;max-width:76vw}
#lines .ln{font-size:2vw;color:var(--dim);border-left:.3vw solid var(--line);
  padding:.6vh 1.4vw;text-align:left;opacity:0;transform:translateY(12px);background:rgba(10,4,7,.7)}
#lines .ln b{color:var(--ink)} #lines .ln .ok{color:var(--ok)} #lines .ln .bad{color:#FF5E79}
#lines .ln .warn{color:var(--warn)}
#grid{position:absolute;inset:0;pointer-events:none;opacity:.35;
  background-image:linear-gradient(rgba(58,13,26,.4) 1px,transparent 1px),
  linear-gradient(90deg,rgba(58,13,26,.4) 1px,transparent 1px);background-size:60px 60px}
#scan{position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 2px,transparent 2px 5px)}
#sweep{position:absolute;left:0;right:0;height:18vh;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(255,23,68,.05),transparent)}
#vig{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%)}
</style>
</head>
<body>
<div id="grid"></div><div id="sweep"></div>
<div id="stage">
  <div id="sig">TRADERCOCKPIT</div>
  <div id="kicker"></div>
  <div id="title"></div>
  <div id="counter" style="display:none"></div>
  <div id="counterlbl" style="display:none"></div>
  <div id="lines"></div>
</div>
<div id="scan"></div><div id="vig"></div>
<script>
"use strict";
/* config from ./cfg.json (written per-section by render_visuals.py before each render):
   {kicker,title,counter:{from,to,label},lines:[html,...],sig} */
let cfg = {kicker:"demo",title:"HUD CARD",lines:["line <b>one</b>","line two"]};
const $ = id => document.getElementById(id);
let titleHTML = "", lines = [];
function init() {
  if (cfg.sig) $("sig").textContent = cfg.sig;
  $("kicker").textContent = cfg.kicker || "";
  titleHTML = (cfg.title || "").replace(/\*\*(.+?)\*\*/g, '<span class="hl">$1</span>');
  lines = (cfg.lines || []).map(h => {
    const d = document.createElement("div"); d.className = "ln"; d.innerHTML = h;
    $("lines").appendChild(d); return d;
  });
  if (cfg.counter) { $("counter").style.display = "block"; $("counterlbl").style.display = "block";
    $("counterlbl").textContent = cfg.counter.label || ""; }
}

const ease = t => t < 0 ? 0 : t > 1 ? 1 : 1 - Math.pow(1 - t, 3);
const T_TITLE = 0.9, T_LINE = 0.55, LINE_STAGGER = 0.7, T_COUNT = 2.2;

window.__seek = function (t) {
  // title types in
  const tp = ease(t / T_TITLE);
  const n = Math.round(titleHTML.length * tp);
  // cut at n visible chars without breaking tags: strip tags for count map
  let out = "", vis = 0, i = 0;
  while (i < titleHTML.length && vis < n) {
    if (titleHTML[i] === "<") { const j = titleHTML.indexOf(">", i); out += titleHTML.slice(i, j + 1); i = j + 1; }
    else { out += titleHTML[i]; i++; vis++; }
  }
  $("title").innerHTML = out + (tp < 1 && Math.floor(t * 3) % 2 ? "▌" : "");
  // counter
  if (cfg.counter) {
    const cp = ease((t - 0.4) / T_COUNT);
    const val = Math.round(cfg.counter.from + (cfg.counter.to - cfg.counter.from) * cp);
    $("counter").textContent = val.toLocaleString("en-US");
    if (cfg.counter.to === 0 && cp >= 1) $("counter").style.color = "var(--accent)";
  }
  // lines stagger in after title
  lines.forEach((ln, k) => {
    const lp = ease((t - T_TITLE - 0.2 - k * LINE_STAGGER) / T_LINE);
    ln.style.opacity = lp; ln.style.transform = `translateY(${12 * (1 - lp)}px)`;
    ln.style.borderLeftColor = lp >= 1 ? "var(--accent)" : "var(--line)";
  });
  // ambient sweep
  $("sweep").style.top = ((t * 12) % 130 - 15) + "vh";
};
fetch("cfg.json").then(r => r.ok ? r.json() : cfg).catch(() => cfg).then(c => {
  cfg = c; init(); window.__seek(0); window.__ready = true;
});
</script>
</body>
</html>
